services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./hospital_billing.db
      - JWT_SECRET_KEY=your_production_secret_key_here
      - APP_NAME=MEDHA HOSPITAL
    volumes:
      - backend-db:/app
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  backend-db:
